<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>유니콘소프트 - Contact</title>
    <link rel="stylesheet" href="/style.css?v=20260528d">
  </head>
  <body>
    <div class="site">
      <header>
        <a class="brand" href="/">UNICORN<br>SOFT</a>
        <nav class="nav" aria-label="site">
          <a href="/">Home</a>
          <a href="/about/">About</a>
          <a href="/products/">Products</a>
          <a class="active" href="/contact/">Contact</a>
        </nav>
        <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>
      <main class="main page">
        <section class="contact-wrap">
          <h1 class="page-title">Contact.</h1>
          <h2 class="address">101, Gasan digital 2-ro, Geumcheon-gu, Seoul, Republic of Korea</h2>
          <h2 class="address"><a href="mailto:support@unicorn-soft.com">support@unicorn-soft.com</a><br>Tel: 070-4680-7219</h2>
          <form class="contact-form">
            <input name="name" autocomplete="name" placeholder="Name" aria-label="Name">
            <input name="email" type="email" autocomplete="email" placeholder="Email" aria-label="Email">
            <input class="wide" name="subject" placeholder="Subject" aria-label="Subject">
            <textarea name="message" placeholder="Message" aria-label="Message"></textarea>
            <button type="submit">Submit</button>
          </form>
          <div class="map-preview" aria-label="map preview">
            <iframe
              title="Unicorn Soft location map"
              src="https://www.openstreetmap.org/export/embed.html?bbox=126.875%2C37.475%2C126.884%2C37.482&layer=mapnik&marker=37.4785%2C126.8795"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <a
              class="map-link"
              href="https://www.openstreetmap.org/search?query=101%2C%20Gasan%20digital%202-ro%2C%20Geumcheon-gu%2C%20Seoul"
              target="_blank"
              rel="noopener"
            >지도에서 열기</a>
          </div>
        </section>
      </main>
      <aside class="side-rail" aria-label="quick links">
        <a class="rail-product" href="https://getunicorn.app" aria-label="유니콘 Pro 공식 홈페이지">
          <img src="/assets/unicorn-pro.png" alt="">
        </a>
        <a class="rail-mail" href="/contact/" aria-label="Contact">
          <svg class="mail-icon" viewBox="0 31 200.1 138" aria-hidden="true" focusable="false">

        </a>
      </aside>
